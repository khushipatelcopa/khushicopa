function fillData(){
    let name = document.getElementById("studentName").value;

    if(name && students[name]){
        document.getElementById("address").value = students[name].address || "";
        document.getElementById("trade").value = students[name].trade || "";
        document.getElementById("year").value = students[name].year || "";
    } else {
        document.getElementById("address").value = "";
        document.getElementById("trade").value = "";
        document.getElementById("year").value = "";
    }
}

function markPresent(){
    let name = document.getElementById("studentName").value;

    if(name == ""){
        alert("Pehle Name Select Kare");
        return;
    }

    let now = new Date();

    let data = {
        name: name,
        address: students[name].address,
        trade: students[name].trade,
        year: students[name].year,
        date: now.toLocaleDateString("hi-IN"),
        time: now.toLocaleTimeString("hi-IN"),
        status: "Present"
    };

    // संदेश दिखाएं कि रिक्वेस्ट भेजी जा रही है
    document.getElementById("msg").style.color = "orange";
    document.getElementById("msg").innerHTML = "Submitting...";

    fetch("https://script.google.com/macros/s/AKfycbw0TW-q4RAbrkqXACyKP4-mze3WvGJkshIxrnjjBG8yktzBc_Ya5lCXqoIpsm979tEG/exec", { // यहाँ अपनी असली Google Web App URL डालें
        method: "POST",
        mode: "no-cors", // Google App Script के लिए सामान्यतः इसकी ज़रूरत होती है
        body: JSON.stringify(data)
    })
    .then(() => {
        document.getElementById("msg").style.color = "green";
        document.getElementById("msg").innerHTML = name + " is present ✅";
    })
    .catch(err => {
        console.error(err);
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerHTML = "Error recording attendance ❌";
    });
}
